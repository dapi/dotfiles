# Cache passphrase for 7 days since last use
default-cache-ttl 604800

# Hard maximum cache lifetime: 7 days
max-cache-ttl 604800

# macOS pinentry — integrates with Keychain
# Path is substituted at install time by `make gnupg-pinentry-mac`
pinentry-program PINENTRY_PLACEHOLDER

# No smartcard reader on this machine
disable-scdaemon
