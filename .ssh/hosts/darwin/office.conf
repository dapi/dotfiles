# С macOS на Linux: office/office2
# RemoteForward: Linux GPG socket (/run/user/1000/...) ← macOS GPG extra socket
# TERM: fallback на xterm-256color т.к. на Linux может не быть terminfo для ghostty
Host office
  Hostname office.brandymint.ru
  SetEnv TERM=xterm-256color
  RemoteForward /run/user/1000/gnupg/S.gpg-agent /Users/danil/.gnupg/S.gpg-agent.extra

Host office2
  Hostname office.brandymint.ru
  Port 222
  SetEnv TERM=xterm-256color
  RemoteForward /run/user/1000/gnupg/S.gpg-agent /Users/danil/.gnupg/S.gpg-agent.extra

# С macOS на macOS: office3
# RemoteForward: macOS GPG socket (~/.gnupg/...) ← macOS GPG extra socket
# TERM не переопределяем — terminfo ставится автоматически через ssh-terminfo
Host office3
  Hostname 192.168.88.20
  RemoteForward /Users/danil/.gnupg/S.gpg-agent /Users/danil/.gnupg/S.gpg-agent.extra
