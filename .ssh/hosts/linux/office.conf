# С Linux на Linux: office/office2
# RemoteForward не нужен — GPG agent работает локально
Host office
  Hostname office.brandymint.ru

Host office2
  Hostname 192.168.88.10

# С Linux на macOS: office3
# RemoteForward: macOS GPG socket (~/.gnupg/...) ← Linux GPG socket (/run/user/1000/...)
Host office3
  Hostname 192.168.88.20
  Port 223
  RemoteForward /Users/danil/.gnupg/S.gpg-agent /run/user/1000/gnupg/S.gpg-agent.extra
