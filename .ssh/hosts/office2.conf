Host office2 192.168.88.10
    # Forward macOS GPG agent to Linux so passphrase is prompted on macOS.
    # remote: GPG agent socket on office2 (UID=1000)
    # local:  GPG extra-socket on macOS (check: gpgconf --list-dirs agent-extra-socket)
    RemoteForward /run/user/1000/gnupg/S.gpg-agent /Users/danil/.gnupg/S.gpg-agent.extra
